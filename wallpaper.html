<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="梅元知角色壁纸精选集，白衣孤影，寒霜为骨，孤傲为魂">
    <title>梅元知 · 白衣孤影壁纸集</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0e12;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', serif;
            color: #e5e9ed;
            min-height: 100vh;
        }

        .back-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(20, 22, 27, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(150, 160, 170, 0.4);
            padding: 10px 20px;
            border-radius: 40px;
            color: #cfdee9;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #2d3f4b;
            border-color: #7d9ab0;
            transform: translateX(-3px);
        }

        .hero {
            text-align: center;
            padding: 2rem 1rem 1rem;
            background: linear-gradient(145deg, rgba(15, 18, 22, 0.85), rgba(8, 10, 14, 0.9));
            border-bottom: 1px solid #4c5a66;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 500;
            font-family: '华文楷书', 'KaiTi', serif;
            letter-spacing: 8px;
            color: #eef3fc;
            text-shadow: 0 0 8px #7192aa;
        }

        .hero p {
            color: #aabbc9;
            margin-top: 8px;
            font-style: italic;
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        /* ========== 方案三：极简光影框 + 悬浮拉伸 ========== */
        .wallpaper-card {
            background: rgba(18, 20, 26, 0.75);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(130, 145, 160, 0.4);
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            box-shadow: 0 10px 18px -8px rgba(0, 0, 0, 0.5);
        }

        .wallpaper-card:hover {
            transform: scale(1.01) translateY(-6px);
            border-color: #b9a77d;
            box-shadow: 0 22px 30px -14px black, 0 0 0 2px rgba(200, 180, 120, 0.2);
        }

        .wallpaper-img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #1a1e26;
            display: block;
        }

        .wallpaper-info {
            padding: 0.8rem 1rem;
        }

        .wallpaper-info h3 {
            font-size: 0.95rem;
            color: #cfdee9;
            margin-bottom: 4px;
        }

        .wallpaper-info p {
            font-size: 0.7rem;
            color: #95adc2;
        }

        .download-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: #1f262e;
            border: 0.5px solid #6d818f;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #cbdae6;
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .download-btn:hover {
            background: #2d3f4b;
            border-color: #7d9ab0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            opacity: 0.7;
            padding: 10px;
            min-width: 44px;
            text-align: center;
        }

        .modal-close:hover {
            opacity: 1;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            padding: 2rem;
            color: #7b8b9b;
            border-top: 1px solid #2d3943;
        }

        .music-float-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(197, 138, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .music-float-btn:hover {
            transform: scale(1.08);
            background: rgba(197, 138, 255, 1);
            box-shadow: 0 6px 20px rgba(197, 138, 255, 0.4);
        }

        .music-float-btn i {
            font-size: 26px;
            color: white;
        }

        /* 收集匣计数器样式 */
        .collection-counter {
            text-align: center;
            margin: 0 2rem 1rem;
        }
        .counter-badge {
            border: 1px solid #7e6b4e;
            padding: 6px 20px;
            border-radius: 40px;
            background: #1a1f25;
            font-size: 0.75rem;
            backdrop-filter: blur(4px);
            color: #c9bb9a;
        }

        @media (max-width: 700px) {
            .wallpaper-grid {
                gap: 1rem;
            }
            .hero h1 {
                font-size: 1.6rem;
            }
            .music-float-btn {
                bottom: 16px;
                right: 16px;
                width: 48px;
                height: 48px;
            }
            .music-float-btn i {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="back-bar">
        <a href="tongren.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> 返回同人衍生
        </a>
    </div>

    <div class="hero">
        <h1>白衣孤影 · 壁纸集</h1>
        <p>「寒霜为骨，一屏一壁皆为君留」—— 梅元知角色壁纸精选</p>
    </div>

    <!-- 收集匣计数器 -->
    <div class="collection-counter">
        <span class="counter-badge">
            📦 壁纸收集匣 · 共 <span id="totalCount">0</span> 张
        </span>
    </div>

    <div class="gallery">
        <div class="wallpaper-grid" id="wallpaperGrid">
            <!-- 壁纸将通过 JS 动态生成 -->
        </div>
    </div>

    <div style="background: rgba(0,0,0,0.35); border-radius: 20px; padding: 0.8rem; text-align: center; margin: 1rem 2rem;">
        <p style="font-size: 0.65rem; color: #b8a0d0;">
             壁纸素材来自《沧元图》官方公开物料及动画截图，版权归原作者所有。<br>
            非商业粉丝站点 · 仅作收藏交流 · 侵删
        </p>
    </div>

    <footer>
        <p> 点击图片可预览大图 | 保存即可设为壁纸 </p>
    </footer>

    <div class="modal" id="imageModal">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="预览大图">
    </div>

    <div class="music-float-btn" onclick="window.open('https://www.bilibili.com/video/BV1AcAhesEPG/', '_blank')">
        <i class="fas fa-music"></i>
    </div>

    <script>
        // ========== 壁纸列表（图片在 image/ 文件夹）==========
        const wallpapers = [
            { url: "image/guanfang1.jpg", title: "白衣孤影", description: "白衣胜雪，孤影长存" },
            { url: "image/guanfang2.jpg", title: "冰心玉壶", description: "冰心一片，玉壶为证" },
            { url: "image/guanfang3.jpg", title: "指尖符箓", description: "一念之间，天地自清" },
            { url: "image/guanfang4.jpg", title: "狐天沧海", description: "根基术！" },
            { url: "image/gf5.jpg", title: "沉默如雪", description: "千言万语，终化无声" },
            { url: "image/gf6.jpg", title: "万家灯火", description: "万家灯火，为君长明" },
            { url: "image/gf7.jpg", title: "九尾燃命", description: "燃尽生命，守护众生" },
            { url: "image/gf8.jpg", title: "紫气东来", description: "青丘之力，逆天觉醒" },
            { url: "image/gf9.jpg", title: "霜剑问心", description: "剑意凌霜，问道于心" },
            { url: "image/gf10.jpg", title: "孤影独行", description: "纵使孤身，亦向前行" },
            { url: "image/gf11.jpg", title: "灯火长明", description: "万家灯火，终有一盏为你" },
            { url: "image/gf12.jpg", title: "铃铛清响", description: "步履之间，清音泠泠" },
            { url: "image/gf13.jpg", title: "冰心玉壶", description: "冰心一片，玉壶为证" },
            { url: "image/gf14.jpg", title: "狐尾道身", description: "九尾舒卷，紫气东来" },
            { url: "image/gf15.jpg", title: "狐天沧海", description: "青丘之力，逆识海而开" },
            { url: "image/gf16.jpg", title: "狐鸣", description: "青丘之力，逆天而鸣" },
            { url: "image/gf17.jpg", title: "狐尾道身", description: "见青丘，逆展开" },
            { url: "image/gf18.jpg", title: "青丘绝唱", description: "我于坟前三叩首，请狐为神胄" },
           
        ];

        // 更新总数显示
        document.getElementById('totalCount').innerText = wallpapers.length;

        function getImageHtml(wallpaper, index) {
            return `<div class="wallpaper-img-container" style="position: relative;">
                        <img class="wallpaper-img" 
                             src="${wallpaper.url}" 
                             alt="${wallpaper.title}" 
                             loading="lazy"
                             style="cursor: pointer;"
                             onerror="this.onerror=null; this.parentElement.innerHTML='<div class=placeholder-img><i class=\\'fas fa-image\\'></i><span>图片加载失败<br><small style=\\'font-size:11px;\\'>请检查图片是否存在</small></span></div>';">
                    </div>`;
        }

        function renderWallpapers() {
            const grid = document.getElementById('wallpaperGrid');
            grid.innerHTML = wallpapers.map((wp, idx) => `
                <div class="wallpaper-card" data-index="${idx}" data-url="${wp.url}">
                    ${getImageHtml(wp, idx)}
                    <div class="wallpaper-info">
                        <h3><i class="fas fa-snowflake"></i> ${wp.title}</h3>
                        <p>${wp.description}</p>
                        <div class="download-btn" data-url="${wp.url}" data-title="${wp.title}">
                            <i class="fas fa-expand"></i> 查看大图
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.wallpaper-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.download-btn')) return;
                    const idx = card.dataset.index;
                    if (idx !== undefined) {
                        showModal(wallpapers[idx].url, wallpapers[idx].title);
                    }
                });
            });

            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const url = btn.dataset.url;
                    if (url) {
                        showModal(url);
                    }
                });
            });
        }

        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');

        function showModal(imgUrl, title = '') {
            if (imgUrl && imgUrl !== '#') {
                modalImg.src = imgUrl;
                modal.classList.add('active');
                if (title) {
                    modal.setAttribute('data-title', title);
                }
            } else {
                alert('图片路径无效，请检查图片是否存在');
            }
        }

        function closeModal() {
            modal.classList.remove('active');
            setTimeout(() => {
                if (!modal.classList.contains('active')) {
                    modalImg.src = '';
                }
            }, 200);
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target.classList.contains('modal-close')) {
                closeModal();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        window.addEventListener('load', () => {
            console.log('壁纸集已加载，共 ' + wallpapers.length + ' 张壁纸');
        });

        renderWallpapers();
    </script>
</body>
</html>
