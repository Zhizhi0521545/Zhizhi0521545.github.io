<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>留灯处 · 灯火集｜梅元知</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', sans-serif;
            color: #e8d9ff;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('yuan3.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(139, 90, 200, 0.15);
            padding: 0.6rem 2rem;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #6a3c9e, #9b59b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: '华文楷书', 'KaiTi', serif;
        }

        .nav-logo i {
            margin-right: 8px;
        }

        .nav-menu {
            display: flex;
            gap: 0.5rem;
            list-style: none;
        }

        .nav-link {
            color: #4a4a6a;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 24px;
        }

        .nav-link:hover {
            background: rgba(106, 60, 158, 0.1);
            color: #6a3c9e;
        }

        .nav-link.active {
            background: #2a1a55;
            color: #e8d9ff;
        }

        .nav-toggle {
            display: none;
            font-size: 1.5rem;
            color: #4a4a6a;
            cursor: pointer;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 1.5rem 2.5rem;
            position: relative;
            z-index: 2;
        }

        .page-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-family: '华文楷书', 'KaiTi', serif;
            color: #e8d9ff;
        }

        .page-header p {
            color: #d4c4e8;
            font-size: 0.85rem;
        }

        .msg-wall {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1rem 1rem 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(197, 138, 255, 0.25);
        }

        .wish-pool {
            background: linear-gradient(145deg, rgba(30, 18, 55, 0.85), rgba(20, 10, 40, 0.9));
            backdrop-filter: blur(12px);
            border: 1px solid #d4af37;
            border-radius: 32px;
            padding: 1rem 1rem 1.2rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .wish-pool .block-title {
            color: #f0e6ff;
            border-left-color: #d4af37;
        }

        .block-title {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid #c58aff;
            padding-left: 0.7rem;
        }

        .msg-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 260px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .msg-card {
            background: rgba(0, 0, 0, 0.45);
            padding: 0.7rem 1rem;
            border-radius: 24px;
            border-left: 3px solid #c58aff;
        }

        .wish-card {
            background: rgba(20, 12, 38, 0.7);
            border-left: 3px solid #d4af37;
            border-radius: 24px;
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.3);
        }

        .msg-name {
            font-weight: bold;
            color: #c58aff;
            font-size: 0.8rem;
        }

        .wish-card .msg-name {
            color: #f3b33d;
        }

        .msg-time {
            font-size: 0.6rem;
            color: #b8a0d0;
            margin-left: 0.5rem;
        }

        .msg-content {
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }

        /* 写信卡片 */
        .letter-card {
            background: linear-gradient(145deg, rgba(30, 18, 55, 0.85), rgba(20, 10, 40, 0.9));
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid #d13a3a;
            color: #e8d9ff;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            animation: redBreathing 4s ease-in-out infinite;
        }

        @keyframes redBreathing {
            0% { box-shadow: 0 0 0 0 rgba(209, 58, 58, 0.1), 0 0 0 1px rgba(209, 58, 58, 0.2); }
            50% { box-shadow: 0 0 0 1px rgba(209, 58, 58, 0.4), 0 0 6px 2px rgba(209, 58, 58, 0.2); }
            100% { box-shadow: 0 0 0 0 rgba(209, 58, 58, 0.1), 0 0 0 1px rgba(209, 58, 58, 0.2); }
        }

        .letter-card::before {
            content: "";
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border-top: 2px solid #d13a3a;
            border-right: 2px solid #d13a3a;
            border-radius: 0 12px 0 0;
            opacity: 0.7;
        }

        .letter-card::after {
            content: "";
            position: absolute;
            bottom: 12px;
            left: 12px;
            width: 40px;
            height: 40px;
            border-bottom: 2px solid #d13a3a;
            border-left: 2px solid #d13a3a;
            border-radius: 0 0 0 12px;
            opacity: 0.7;
        }

        .letter-header {
            font-size: 1.2rem;
            font-weight: 500;
            border-left: 4px solid #d13a3a;
            padding-left: 0.75rem;
            margin-bottom: 1.2rem;
            color: #f0e6ff;
        }

        .letter-textarea {
            width: 100%;
            background: rgba(20, 12, 38, 0.5);
            border: 1px solid rgba(209, 58, 58, 0.3);
            border-radius: 20px;
            padding: 1rem;
            font-size: 0.9rem;
            color: #f0e6ff;
            font-family: inherit;
            line-height: 1.6;
            resize: vertical;
            min-height: 200px;
        }

        .letter-textarea:focus {
            outline: none;
            border-color: #d13a3a;
        }

        .letter-textarea::placeholder {
            color: rgba(200, 180, 230, 0.4);
            font-style: italic;
        }

        .letter-btn {
            background: #d13a3a;
            border: none;
            padding: 0.7rem;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.2s;
        }

        .letter-btn:hover {
            background: #ff5555;
        }

        .my-letters {
            margin-top: 1.5rem;
            border-top: 1px dashed #8e7cb3;
            padding-top: 1rem;
        }

        .my-letter-item {
            background: rgba(20, 12, 38, 0.7);
            border-radius: 20px;
            padding: 0.6rem 1rem;
            margin-bottom: 0.6rem;
            font-size: 0.8rem;
            color: #e8d9ff;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 2px solid #d13a3a;
        }
        .my-letter-item:hover {
            background: rgba(209, 58, 58, 0.2);
            transform: translateX(3px);
        }

        .delete-letter {
            float: right;
            background: none;
            border: none;
            color: #d13a3a;
            cursor: pointer;
        }

        /* ========== 西幻/哥特风弹窗 ========== */
        .letter-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '华文楷书', 'Georgia', serif;
        }

        .letter-modal.active, .letter-modal[style*="display: flex"] {
            display: flex !important;
        }

        /* 哥特卷轴主体 */
        .gothic-scroll {
            max-width: 520px;
            width: 90%;
            background: #0a0a0f;
            border: 2px solid #8b6b42;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(139, 107, 66, 0.2);
            position: relative;
            animation: fadeInUp 0.3s ease;
        }

        /* 装饰边框层 */
        .gothic-scroll::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid rgba(139, 107, 66, 0.5);
            border-radius: 12px;
            pointer-events: none;
        }

        /* 顶部恶魔角装饰 */
        .gothic-header {
            text-align: center;
            padding: 1.2rem 1.5rem 0.5rem;
            border-bottom: 1px solid #4a2c1a;
            position: relative;
        }

        .gothic-header h3 {
            font-size: 1.5rem;
            color: #d4a76a;
            letter-spacing: 4px;
            font-weight: 500;
            text-shadow: 0 0 5px rgba(212, 167, 106, 0.5);
            margin: 0;
        }

        .gothic-header p {
            font-size: 0.7rem;
            color: #8a6a4a;
            margin-top: 6px;
        }

        .gothic-corner {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 1rem;
            color: #6a4a2a;
            cursor: pointer;
            transition: 0.2s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .gothic-corner:hover {
            color: #d4a76a;
            background: rgba(139, 107, 66, 0.2);
        }

        /* 主体内容区 */
        .gothic-body {
            padding: 1.5rem 1.8rem;
            color: #e0d0b8;
            font-size: 0.95rem;
            line-height: 1.75;
            text-align: center;
            min-height: 200px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .gothic-body p {
            margin-bottom: 1rem;
            text-align: left;
        }

        /* 滚动条 */
        .gothic-body::-webkit-scrollbar {
            width: 4px;
        }
        .gothic-body::-webkit-scrollbar-track {
            background: #2a1a0a;
            border-radius: 4px;
        }
        .gothic-body::-webkit-scrollbar-thumb {
            background: #8b6b42;
            border-radius: 4px;
        }

        /* 恶魔印章区 */
        .gothic-seal {
            text-align: center;
            padding: 0.8rem 1.5rem 1rem;
            border-top: 1px solid #4a2c1a;
            margin-top: 0;
            color: #8a6a4a;
            font-size: 0.7rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .gothic-seal span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* 底部按钮 */
        .gothic-buttons {
            display: flex;
            border-top: 1px solid #3a2a1a;
            background: #0e0e14;
            border-radius: 0 0 16px 16px;
            overflow: hidden;
        }

        .gothic-btn {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            color: #b89a6a;
            border: none;
            background: transparent;
            font-family: inherit;
        }

        .gothic-btn:first-child {
            border-right: 1px solid #3a2a1a;
        }

        .gothic-btn.delete-btn:hover {
            background: #4a1a1a;
            color: #ff7777 !important;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 1rem;
            color: rgba(232, 217, 255, 0.5);
            border-top: 1px solid rgba(197, 138, 255, 0.2);
            padding-top: 1rem;
        }

        @media (max-width: 700px) {
            .container {
                padding: 80px 1rem 2rem;
            }
            .nav-toggle {
                display: block;
            }
            .nav-menu {
                position: fixed;
                top: 55px;
                left: -100%;
                width: 100%;
                background: rgba(255, 255, 255, 0.98);
                flex-direction: column;
                transition: 0.3s;
            }
            .nav-menu.active {
                left: 0;
            }
            .gothic-body {
                padding: 1rem;
                font-size: 0.85rem;
            }
            .gothic-header h3 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<div class="container">
    <div class="page-header">
        <h1><i class="fas fa-candle"></i> 留灯处 · 灯火集</h1>
        <p>「每一盏灯，都是一次抵达」</p>
    </div>

    <div class="msg-wall">
        <div class="block-title">🌙 留言墙 · 灯火集</div>
        <div class="msg-list" id="messageList"></div>
        <div style="margin-top: 0.8rem; display: flex; gap: 0.5rem;">
            <input type="text" id="msgInput" placeholder="写一句想说的话…" style="flex:1; background:#00000055; border:1px solid #c58aff; border-radius: 40px; padding: 0.5rem 1rem; color:#e8d9ff;">
            <button id="sendMsgBtn" style="background:#6a3c9e; border:none; padding:0 1rem; border-radius: 40px; cursor:pointer;">📮 留灯</button>
        </div>
    </div>

    <div class="wish-pool">
        <div class="block-title">✨ 灯愿池 · 心愿灯</div>
        <div class="msg-list" id="wishList"></div>
        <div style="margin-top: 0.8rem; display: flex; gap: 0.5rem;">
            <input type="text" id="wishInput" placeholder="写下你对梅元知的祝福 / 心愿…" style="flex:1; background:#00000055; border:1px solid #d4af37; border-radius: 40px; padding: 0.5rem 1rem; color:#e8d9ff;">
            <button id="sendWishBtn" style="background:#d4af37; border:none; padding:0 1rem; border-radius: 40px; color:#2c2418; font-weight:bold; cursor:pointer;">✨ 点灯</button>
        </div>
    </div>

    <div class="letter-card">
        <div class="letter-header">🕯️ 寄往灯火 · 一封未寄的信</div>
        <textarea id="letterBody" class="letter-textarea" placeholder="写一封信给梅元知…&#10;&#10;这里可以写任何你想说的话，&#10;心事、思念、或者只是一句问候……"></textarea>
        <button id="saveLetterBtn" class="letter-btn">📩 存档</button>
        <div class="my-letters">
            <div style="font-weight: 500; margin-bottom: 0.5rem;">📬 我的信件存档（点击查看）</div>
            <div id="myLettersList"></div>
        </div>
    </div>

<!-- ========== 西幻/哥特风弹窗 ========== -->
<div id="letterModal" class="letter-modal">
    <div class="gothic-scroll">
        <div class="gothic-header">
            <div class="gothic-corner" onclick="closeModal()">✕</div>
            <h3> 灯火亲启 </h3>
            <p>「九尾为信，灯火为凭」</p>
        </div>
        <div class="gothic-body" id="modalBody">
            加载中...
        </div>
        <div class="gothic-seal">
            <span> 永念</span>
            <span>岁岁安康</span>
        </div>
        <div class="gothic-buttons">
            <div class="gothic-btn delete-btn" id="modalDeleteBtn" style="color: #d44a4a;"> 删除此信</div>
            <div class="gothic-btn" onclick="closeModal()"> 收起此信</div>
        </div>
    </div>
</div>

<script>
    const names = ["点灯人·拂雪", "孤舟听剑", "月下梅影", "东域过客", "青衫不醉", "寒江一叶", "灯火守望者", "紫狐随行"];

    // 留言功能
    let messages = JSON.parse(localStorage.getItem('mei_messages') || '[]');
    function saveMessages() { localStorage.setItem('mei_messages', JSON.stringify(messages)); }
    function renderMessages() {
        const container = document.getElementById('messageList');
        if (!container) return;
        container.innerHTML = messages.slice().reverse().slice(-40).map(m => `
            <div class="msg-card">
                <div><span class="msg-name">@${escapeHtml(m.name)}</span><span class="msg-time">${formatTime(m.time)}</span></div>
                <div class="msg-content">${escapeHtml(m.content)}</div>
            </div>
        `).join('');
    }
    
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    if (sendMsgBtn) {
        sendMsgBtn.addEventListener('click', () => {
            const input = document.getElementById('msgInput');
            const val = input.value.trim();
            if (!val) return;
            messages.push({ name: names[Math.floor(Math.random() * names.length)], content: val, time: Date.now() });
            saveMessages();
            renderMessages();
            input.value = '';
        });
    }

    // 心愿功能
    let wishes = JSON.parse(localStorage.getItem('mei_wishes') || '[]');
    function saveWishes() { localStorage.setItem('mei_wishes', JSON.stringify(wishes)); }
    function renderWishes() {
        const container = document.getElementById('wishList');
        if (!container) return;
        container.innerHTML = wishes.slice().reverse().slice(-40).map(w => `
            <div class="msg-card wish-card">
                <div><span class="msg-name">✨ @${escapeHtml(w.name)}</span><span class="msg-time">${formatTime(w.time)}</span></div>
                <div class="msg-content">${escapeHtml(w.content)}</div>
            </div>
        `).join('');
    }
    
    const sendWishBtn = document.getElementById('sendWishBtn');
    if (sendWishBtn) {
        sendWishBtn.addEventListener('click', () => {
            const input = document.getElementById('wishInput');
            const val = input.value.trim();
            if (!val) return;
            wishes.push({ name: names[Math.floor(Math.random() * names.length)], content: val, time: Date.now() });
            saveWishes();
            renderWishes();
            input.value = '';
        });
    }

    // 信件功能
    let letters = JSON.parse(localStorage.getItem('mei_private_letters') || '[]');
    let currentLetterIndex = null;
    
    function saveLetters() { localStorage.setItem('mei_private_letters', JSON.stringify(letters)); }
    
    function renderLetters() {
        const container = document.getElementById('myLettersList');
        if (!container) return;
        if (letters.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#b8a0d0; padding:1rem;">📭 暂无信件，写一封信吧</div>';
            return;
        }
        container.innerHTML = letters.slice().reverse().map((l, idx) => {
            const originalIdx = letters.length - 1 - idx;
            const preview = l.body.length > 50 ? l.body.substring(0, 50) + '…' : l.body;
            return `
            <div class="my-letter-item" data-idx="${originalIdx}">
                <button class="delete-letter" data-idx="${originalIdx}" onclick="event.stopPropagation(); deleteLetter(${originalIdx})">🗑️</button>
                📜 ${escapeHtml(preview)}<br>
                <span style="font-size:0.55rem;">${formatTime(l.time)}</span>
            </div>
        `}).join('');
        
        document.querySelectorAll('.my-letter-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-letter')) return;
                const idx = parseInt(item.getAttribute('data-idx'));
                showLetterDetail(idx);
            });
        });
    }
    
    function deleteLetter(idx) {
        if (confirm('确定要删除这封信吗？')) {
            letters.splice(idx, 1);
            saveLetters();
            renderLetters();
            if (currentLetterIndex === idx) {
                closeModal();
                currentLetterIndex = null;
            } else if (currentLetterIndex > idx) {
                currentLetterIndex--;
            }
        }
    }
    
    function showLetterDetail(idx) {
        const letter = letters[idx];
        if (!letter) return;
        currentLetterIndex = idx;
        const date = new Date(letter.time);
        const timeStr = `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
        const modalBody = document.getElementById('modalBody');
        if (modalBody) {
            modalBody.innerHTML = `<div style="margin-bottom:12px; font-size:0.75rem; color:#b89a6a;"> ${timeStr}</div><div style="white-space:pre-wrap; text-align:left;">${escapeHtml(letter.body).replace(/\n/g, '<br>')}</div>`;
        }
        document.getElementById('letterModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('letterModal').style.display = 'none';
        currentLetterIndex = null;
    }
    
    // 弹窗内删除按钮功能
    const modalDeleteBtn = document.getElementById('modalDeleteBtn');
    if (modalDeleteBtn) {
        modalDeleteBtn.addEventListener('click', () => {
            if (currentLetterIndex !== null && currentLetterIndex >= 0 && currentLetterIndex < letters.length) {
                if (confirm('确定要删除这封信吗？')) {
                    letters.splice(currentLetterIndex, 1);
                    saveLetters();
                    renderLetters();
                    closeModal();
                    currentLetterIndex = null;
                    alert('📭 信件已删除');
                }
            } else {
                alert('无法删除这封信');
            }
        });
    }
    
    const letterModal = document.getElementById('letterModal');
    if (letterModal) {
        letterModal.addEventListener('click', (e) => {
            if (e.target === letterModal) {
                closeModal();
            }
        });
    }
    
    const saveLetterBtn = document.getElementById('saveLetterBtn');
    if (saveLetterBtn) {
        saveLetterBtn.addEventListener('click', () => {
            const body = document.getElementById('letterBody').value.trim();
            if (!body) { alert('请写下信件内容'); return; }
            letters.push({ body, time: Date.now() });
            saveLetters();
            renderLetters();
            document.getElementById('letterBody').value = '';
            alert('📬 信件已存档 · 只有你能看到');
        });
    }

    function formatTime(ts) {
        const d = new Date(ts);
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 初始化渲染
    renderMessages();
    renderWishes();
    renderLetters();

    // 移动端菜单
    const navToggle = document.getElementById('navToggle');
    const navMenu = document.querySelector('.nav-menu');
    if (navToggle) {
        navToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
    }
    
    // 暴露全局函数
    window.deleteLetter = deleteLetter;
    window.closeModal = closeModal;
</script>
</body>
</html>
