<script>
// Supabase 配置
const SUPABASE_URL = 'https://ziuzlbyepdcalmjfwbyz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DONsSE_XcQQPTyLzTLaKtQ_p2CX8Gxd';

// 创建客户端
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let currentLetters = [];
let currentLetterIndex = null;

const namePrefix = ["点灯人·拂雪", "孤舟听剑", "月下梅影", "东域过客", "青衫不醉", "寒江一叶", "灯火守望者", "紫狐随行"];
function getRandomName() {
    return namePrefix[Math.floor(Math.random() * namePrefix.length)];
}

// 匿名登录
async function anonymousLogin() {
    try {
        const { data, error } = await supabaseClient.auth.signInAnonymously();
        if (error) throw error;
        currentUser = data.user;
        console.log('登录成功', currentUser);
        return true;
    } catch (err) {
        console.error('登录失败', err);
        return false;
    }
}

// 留言
async function loadMessages() {
    if (!supabaseClient) return;
    const { data, error } = await supabaseClient
        .from('messages')
        .select('*')
        .order('time', { ascending: false });  // 去掉 limit，显示全部
    if (error) { console.error(error); return; }
    const container = document.getElementById('messageList');
    if (!container) return;
    container.innerHTML = data.map(m => `
        <div class="msg-card">
            <div><span class="msg-name">@${escapeHtml(m.name)}</span><span class="msg-time">${formatTime(m.time)}</span></div>
            <div class="msg-content">${escapeHtml(m.content)}</div>
        </div>
    `).join('');
}

async function sendMessage(content) {
    if (!content.trim()) return;
    await supabaseClient.from('messages').insert({
        name: getRandomName(),
        content: content,
        time: Date.now()
    });
    await loadMessages();
}

// 心愿
async function loadWishes() {
    if (!supabaseClient) return;
    const { data, error } = await supabaseClient
        .from('wishes')
        .select('*')
        .order('time', { ascending: false });
    if (error) { console.error(error); return; }
    const container = document.getElementById('wishList');
    if (!container) return;
    container.innerHTML = data.map(w => `
        <div class="msg-card wish-card">
            <div><span class="msg-name">✨ @${escapeHtml(w.name)}</span><span class="msg-time">${formatTime(w.time)}</span></div>
            <div class="msg-content">${escapeHtml(w.content)}</div>
        </div>
    `).join('');
}

async function sendWish(content) {
    if (!content.trim()) return;
    await supabaseClient.from('wishes').insert({
        name: getRandomName(),
        content: content,
        time: Date.now()
    });
    await loadWishes();
}

// 信件
async function loadMyLetters() {
    if (!currentUser) return;
    const { data, error } = await supabaseClient
        .from('letters')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('time', { ascending: false });
    if (error) { console.error('加载信件失败', error); return; }
    currentLetters = data || [];
    renderLettersList();
}

function renderLettersList() {
    const container = document.getElementById('myLettersList');
    if (!container) return;
    if (currentLetters.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#b8a0d0; padding:1rem;">📭 暂无信件，写一封信吧</div>';
        return;
    }
    container.innerHTML = currentLetters.map((l, idx) => {
        const preview = l.body.length > 50 ? l.body.substring(0, 50) + '…' : l.body;
        return `<div class="my-letter-item" data-idx="${idx}">📜 ${escapeHtml(preview)}<br><span style="font-size:0.55rem;">${formatTime(l.time)}</span></div>`;
    }).join('');
    document.querySelectorAll('.my-letter-item').forEach(item => {
        item.addEventListener('click', (e) => {
            const idx = parseInt(item.getAttribute('data-idx'));
            showLetterDetail(idx);
        });
    });
}

async function saveLetter(body) {
    if (!body.trim() || !currentUser) return;
    await supabaseClient.from('letters').insert({
        user_id: currentUser.id,
        body: body,
        time: Date.now()
    });
    await loadMyLetters();
}

async function deleteLetter(index) {
    const letter = currentLetters[index];
    if (!letter) return;
    await supabaseClient.from('letters').delete().eq('id', letter.id);
    await loadMyLetters();
}

function showLetterDetail(idx) {
    const letter = currentLetters[idx];
    if (!letter) return;
    currentLetterIndex = idx;
    const date = new Date(letter.time);
    const timeStr = `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    document.getElementById('modalBody').innerHTML = `<div style="margin-bottom:12px; font-size:0.75rem;">${timeStr}</div><div style="white-space:pre-wrap;">${escapeHtml(letter.body).replace(/\n/g, '<br>')}</div>`;
    document.getElementById('letterModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('letterModal').style.display = 'none';
    currentLetterIndex = null;
}

function formatTime(ts) {
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// 天气特效

const weatherConfig = {

    '大雨': { icon: '🌧️💧', desc: '少出门，多喝茶🍵', effect: 'heavy_rain' }, '暴雨': { icon: '⛈️💧', desc: '注意安全🌊', effect: 'storm_rain' },
    '小雪': { icon: '🌨️', desc: '加件毛衣🧣', effect: 'light_snow' }, '中雪': { icon: '❄️❄️', desc: '小心路滑⚠️', effect: 'medium_snow' },
    '大雪': { icon: '❄️❄️❄️', desc: '堆雪人吧⛄', effect: 'heavy_snow' }, '雾': { icon: '🌫️', desc: '慢一点，安全第一🚗' },
    '雷阵雨': { icon: '⛈️', desc: '关好窗⚡', effect: 'thunderstorm' }, '雷暴': { icon: '🌩️⚡', desc: '拔掉电器插头🔌', effect: 'thunderstorm' }
};

    try {
        // 1️⃣ 先用一个支持 https 的免费 IP 服务拿城市（中文）
        const geoRes = await fetch('https://api.ip.sb/geoip');
        const geoData = await geoRes.json();
        
       let city = geoData.city || '灯火城';

// 只优化济源周边 IP 识别问题（不影响其他人）
const cityFix = {
  'Pingdingshan': '济源',
  'Zhengzhou': '济源',
  'Luoyang': '济源'
};
if (cityFix[city]) city = cityFix[city];
        // 常见英文城市转中文（可选，好看而已）
        const cityMap = {
            'Zhengzhou': '郑州', 'Luoyang': '洛阳', 'Jiyuan': '济源',
            'Beijing': '北京', 'Shanghai': '上海', 'Guangzhou': '广州',
            'Shenzhen': '深圳', 'Chengdu': '成都', 'Hangzhou': '杭州',
            'Wuhan': '武汉', 'Xi\'an': '西安', 'Nanjing': '南京'
        };
        if (cityMap[city]) city = cityMap[city];
        
        // 2️⃣ 用 wttr.in 拿天气（完全 https，不需要 key）
        const weatherRes = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
        const weatherData = await weatherRes.json();
        
        const temp = weatherData.current_condition[0].temp_C;
        let condition = weatherData.current_condition[0].weatherDesc[0].value.toLowerCase();
        
        let type = '晴';
        if (condition.includes('rain')) type = '中雨';
        else if (condition.includes('snow')) type = '小雪';
        else if (condition.includes('thunder')) type = '雷阵雨';
        else if (condition.includes('fog')) type = '雾';
        else if (condition.includes('cloud')) type = '多云';
        else if (condition.includes('overcast')) type = '阴';
        
        const cfg = weatherConfig[type] || weatherConfig['晴'];
        document.getElementById('weatherIcon').innerHTML = cfg.icon;
        document.getElementById('weatherCity').innerHTML = city;
        document.getElementById('weatherTemp').innerHTML = `${temp}°C`;
        document.getElementById('weatherDesc').innerHTML = cfg.desc;
        if (cfg.effect) startWeatherEffect(cfg.effect);
        
        console.log('✅ 天气获取成功', city, temp, type);
    } catch(e) {
        console.error('天气获取失败，使用默认值', e);
        document.getElementById('weatherCity').innerHTML = '灯火城';
        document.getElementById('weatherTemp').innerHTML = '--°C';
        document.getElementById('weatherDesc').innerHTML = '灯火常明';
    }
}
function startWeatherEffect(effect) {
    stopWeatherEffect();
    currentWeatherEffect = effect;
    const card = document.getElementById('weatherCard');
    weatherCanvas = document.getElementById('weatherCanvas');
    if (!weatherCanvas) return;
    const rect = card.getBoundingClientRect();
    weatherCanvas.width = rect.width;
    weatherCanvas.height = rect.height;
    if (effect.includes('rain')) startRainEffect(effect);
    if (effect.includes('snow')) startSnowEffect(effect);
    if (effect === 'thunderstorm') { startRainEffect('heavy_rain'); startLightning(); }
}

function startRainEffect(effect) {
    let count = effect === 'light_rain' ? 80 : effect === 'medium_rain' ? 150 : 220;
    weatherCtx = weatherCanvas.getContext('2d');
    weatherParticles = [];
    for (let i = 0; i < count; i++) weatherParticles.push({ x: Math.random() * weatherCanvas.width, y: Math.random() * weatherCanvas.height, length: 8 + Math.random() * 15, speed: 6 + Math.random() * 12 });
    function draw() {
        if (!weatherCtx || !weatherCanvas || !currentWeatherEffect.includes('rain')) return;
        weatherCtx.clearRect(0, 0, weatherCanvas.width, weatherCanvas.height);
        for (let p of weatherParticles) {
            weatherCtx.beginPath();
            weatherCtx.moveTo(p.x, p.y);
            weatherCtx.lineTo(p.x - 2, p.y + p.length);
            weatherCtx.strokeStyle = 'rgba(180, 210, 240, 0.5)';
            weatherCtx.stroke();
            p.y += p.speed;
            if (p.y > weatherCanvas.height) { p.y = -p.length; p.x = Math.random() * weatherCanvas.width; }
        }
        weatherAnimationId = requestAnimationFrame(draw);
    }
    draw();
}

function startSnowEffect(effect) {
    let count = effect === 'light_snow' ? 60 : effect === 'medium_snow' ? 100 : 150;
    weatherCtx = weatherCanvas.getContext('2d');
    weatherParticles = [];
    for (let i = 0; i < count; i++) weatherParticles.push({ x: Math.random() * weatherCanvas.width, y: Math.random() * weatherCanvas.height, radius: 2 + Math.random() * 4, speed: 1 + Math.random() * 3 });
    function draw() {
        if (!weatherCtx || !weatherCanvas || !currentWeatherEffect.includes('snow')) return;
        weatherCtx.clearRect(0, 0, weatherCanvas.width, weatherCanvas.height);
        for (let p of weatherParticles) {
            weatherCtx.beginPath();
            weatherCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            weatherCtx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            weatherCtx.fill();
            p.y += p.speed;
            if (p.y > weatherCanvas.height) { p.y = -p.radius; p.x = Math.random() * weatherCanvas.width; }
        }
        weatherAnimationId = requestAnimationFrame(draw);
    }
    draw();
}

let lightningTimeout = null;
function startLightning() {
    const flash = document.getElementById('lightningFlash');
    function schedule() {
        if (currentWeatherEffect !== 'thunderstorm') return;
        lightningTimeout = setTimeout(() => {
            flash.style.background = 'rgba(255, 255, 200, 0.8)';
            setTimeout(() => flash.style.background = 'transparent', 100);
            schedule();
        }, 4000 + Math.random() * 4000);
    }
    schedule();
}

function stopWeatherEffect() {
    if (weatherAnimationId) cancelAnimationFrame(weatherAnimationId);
    if (lightningTimeout) clearTimeout(lightningTimeout);
    if (weatherCtx && weatherCanvas) weatherCtx.clearRect(0, 0, weatherCanvas.width, weatherCanvas.height);
    const flash = document.getElementById('lightningFlash');
    if (flash) flash.style.background = 'transparent';
}

window.addEventListener('resize', () => {
    if (weatherCanvas && currentWeatherEffect !== 'none') {
        const rect = document.getElementById('weatherCard').getBoundingClientRect();
        weatherCanvas.width = rect.width;
        weatherCanvas.height = rect.height;
    }
});

// 绑定事件
function bindEvents() {
    document.getElementById('sendMsgBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('msgInput');
        if (input.value.trim()) { await sendMessage(input.value); input.value = ''; }
    });
    document.getElementById('sendWishBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('wishInput');
        if (input.value.trim()) { await sendWish(input.value); input.value = ''; }
    });
    document.getElementById('saveLetterBtn')?.addEventListener('click', async () => {
        const body = document.getElementById('letterBody').value.trim();
        if (body) { await saveLetter(body); document.getElementById('letterBody').value = ''; alert('📬 信件已存档'); }
    });
    document.getElementById('modalDeleteBtn')?.addEventListener('click', async () => {
        if (currentLetterIndex !== null && confirm('确定删除吗？')) { await deleteLetter(currentLetterIndex); closeModal(); alert('已删除'); }
    });
    document.getElementById('letterModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('letterModal')) closeModal(); });
    document.getElementById('navToggle')?.addEventListener('click', () => document.querySelector('.nav-menu')?.classList.toggle('active'));
}

async function initApp() {
    bindEvents();
    await anonymousLogin();
    await loadMessages();
    await loadWishes();
    await loadMyLetters();
    await initWeather();
}

initApp();
window.closeModal = closeModal;
</script>
