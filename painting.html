<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>梅元知 · 画意集</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 深紫黑渐变背景 */
        body {
            background: linear-gradient(145deg, #140b1f 0%, #1c122e 50%, #0e0718 100%);
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', serif;
            color: #e0d4f0;
            min-height: 100vh;
        }

        .back-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(20, 15, 30, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(150, 110, 200, 0.4);
            padding: 10px 20px;
            border-radius: 40px;
            color: #e0d4f0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #5a3a8a;
            border-color: #c58aff;
            color: white;
            transform: translateX(-3px);
        }

        .hero {
            text-align: center;
            padding: 2rem 1rem 1rem;
            background: transparent;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 500;
            font-family: '华文楷书', 'KaiTi', serif;
            letter-spacing: 8px;
            color: #e8daff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .hero p {
            color: #c8b0e8;
            margin-top: 8px;
            font-style: italic;
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .painting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .painting-card {
            background: rgba(20, 15, 30, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(150, 110, 200, 0.4);
        }

        .painting-card:hover {
            transform: translateY(-6px);
            background: rgba(30, 22, 50, 0.85);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.4);
            border-color: #c58aff;
        }

        .painting-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            background: #2a1a3e;
        }

        .painting-info {
            padding: 0.8rem 1rem 1rem;
        }

        .painting-info h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #f0e6ff;
            margin-bottom: 0.2rem;
        }

        .painting-info p {
            font-size: 0.75rem;
            color: #cdbbf0;
            line-height: 1.4;
        }

        .painting-author {
            font-size: 0.7rem;
            margin-top: 0.4rem;
            color: #b89ad6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .painting-author a {
            color: #e2caff;
            text-decoration: none;
            font-weight: 500;
        }

        .painting-author a:hover {
            text-decoration: underline;
            color: white;
        }

        /* 致谢和投稿区域 */
        .author-credit {
            max-width: 1200px;
            margin: 2rem auto 2rem;
            padding: 0 2rem;
        }
        .credit-card {
            background: rgba(30, 22, 50, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 0.8rem 1.2rem;
            text-align: center;
            border: 1px solid rgba(197, 138, 255, 0.3);
        }
        .credit-card p {
            color: #d9c8f0;
            font-size: 0.75rem;
        }
        .credit-card strong {
            color: #e2b8ff;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            padding: 2rem;
            color: #9a7ab5;
            border-top: 1px solid #3a2a55;
        }

        /* 悬浮音乐按钮 */
        .music-float-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(106, 60, 158, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .music-float-btn:hover {
            transform: scale(1.08);
            background: #8a49a6;
            box-shadow: 0 6px 20px rgba(106, 60, 158, 0.5);
        }

        .music-float-btn i {
            font-size: 26px;
            color: white;
        }

        /* 投稿引导区域 */
        .submit-guide {
            max-width: 1200px;
            margin: 0 auto 2rem;
            padding: 0 2rem;
        }
        .submit-card {
            background: rgba(30, 22, 50, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(200, 170, 240, 0.4);
        }
        .submit-card i {
            font-size: 2rem;
            color: #d8b4ff;
            margin-bottom: 0.5rem;
            display: block;
        }
        .submit-card h3 {
            color: #f0e6ff;
            margin-bottom: 0.5rem;
        }
        .submit-card p {
            color: #cdbbf0;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .submit-btn {
            display: inline-block;
            background: #8e6cb8;
            color: #fff3e6;
            padding: 8px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .submit-btn:hover {
            background: #a07dd0;
            transform: translateY(-2px);
        }

        @media (max-width: 700px) {
            .painting-grid {
                gap: 1rem;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .author-credit {
                padding: 0 1rem;
            }
            .submit-guide {
                padding: 0 1rem;
            }
        }
        /* 图片预览弹窗样式 */
        .image-preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            cursor: pointer;
            justify-content: center;
            align-items: center;
        }

        .image-preview-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            cursor: default;
        }

        .image-preview-content img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .image-preview-close {
            position: absolute;
            top: -40px;
            right: 0;
            font-size: 35px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .image-preview-close:hover {
            color: #c58aff;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="back-bar">
        <a href="tongren.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> 返回同人衍生
        </a>
    </div>

    <div class="hero">
        <h1><i class="fas fa-paintbrush"></i> 画意集 · 灯火为念</h1>
        <p>「一笔一画，皆是心意」</p>
        <p style="font-size: 12px;color: #888;">想看原图点击查看详情</p>
    </div>

    <div class="gallery">
        <div class="painting-grid" id="paintingGrid"></div>
    </div>

    <!-- 投稿引导 -->
    <div class="submit-guide">
        <div class="submit-card">
            <i class="fas fa-pen-fancy"></i>
            <h3> 您的作品也想出现在这里？</h3>
            <p>欢迎投稿梅元知同人作品，审核通过后将在「同人区」展示</p>
            <a href="tongren.html#guide" class="submit-btn">📮 查看投稿指南</a>
        </div>
    </div>

    <!-- 致谢授权画师 -->
    <div class="author-credit">
        <div class="credit-card">
            <p>✨ 致谢：感谢抖音博主 <strong>@一砚清秋</strong>、<strong>@多愁公子剑</strong> 授权使用插画作品</p>
        </div>
    </div>

    <footer>
        <p> 点击卡片跳转原作主页 | 仅供交流与欣赏 </p>
        <p>⭐ 一笔一墨，皆是天骄风骨 </p>
    </footer>

    <!-- 悬浮音乐按钮 -->
    <div class="music-float-btn" onclick="window.open('https://www.bilibili.com/video/BV1AcAhesEPG/', '_blank')">
        <i class="fas fa-music"></i>
    </div>

    <!-- 图片预览弹窗 -->
    <div id="imagePreviewModal" class="image-preview-modal" onclick="closeImagePreview()">
        <div class="image-preview-content" onclick="event.stopPropagation()">
            <span class="image-preview-close" onclick="closeImagePreview()">&times;</span>
            <img id="previewImage" src="" alt="预览大图">
        </div>
    </div>

    <script>
        // ========== 画作数据 ==========
        // url: 优先用 .webp（体积小加载快），如果 .webp 不存在则用原后缀
        // 每个条目都有 .webp 和 .jpg 两种格式，onerror 会自动回退
        const paintings = [
            {
                url: "image/shoulu3.webp",
                fallback: "image/shoulu3.jpg",
                title: "梅元知 · 新造型",
                author: "抖音：一砚清秋",
                link: "https://v.douyin.com/XKJUA--i16E/"
            },
            {
                url: "image/shoulu1.webp",
                fallback: "image/shoulu1.jpg",
                title: "凑七合成神尊",
                author: "抖音：多愁公子剑",
                link: "https://v.douyin.com/3u0PU3djask/"
            },
            {
                url: "image/shoulu2.webp",
                fallback: "image/shoulu2.jpg",
                title: "穿一下灯灯的衣服",
                author: "抖音：多愁公子剑",
                link: "https://v.douyin.com/Uwd870TPQZo/"
            },
            {
                url: "zhiyuyi.webp",
                fallback: "zhiyuyi.jpg",
                title: "你问西湖水 偷走他的几分美 · 知雨意",
                author: "小红书：知雨意",
                link: "http://xhslink.com/o/6vwfDDyMiEU"
            },
            {
                url: "jianwei.webp",
                fallback: "jianwei.jpg",
                title: "明年我们的相遇是在电影院 · 简惟",
                author: "LOFTER：简惟· AI生成",
                link: "https://xinjinjumin722881580653.lofter.com/post/89723a34_34cca586c?incantation=rzEwlk3Q2yqm"
            },
            {
                url: "jianwei2.webp",
                fallback: "jianwei2.jpg",
                title: "明年我们的相遇是在电影院 · 简惟",
                author: "LOFTER：简惟",
                link: "https://xinjinjumin722881580653.lofter.com/post/89723a34_34cca586c?incantation=rzEwlk3Q2yqm"
            },
            {
                url: "suisi3.webp",
                fallback: "suisi3.jpg",
                title: "二拜天地x梅元知 · 不怕人间妖魔当道，万般皆是苦",
                author: "小红书：岁司",
                link: "http://xhslink.com/o/6tsDZnxy8e"
            },
            {
                url: "suisi1.webp",
                fallback: "suisi1.jpg",
                title: "一枝梅 · 银铃响过 原是故人来",
                author: "小红书：岁司",
                link: "http://xhslink.com/o/3gojrp6hQh4"
            },
            {
                url: "yin.webp",
                fallback: "yin.jpg",
                title: "元知啥时候复活",
                author: "微博：yin",
                special: true,
                originalUrl: "yin.jpg",
                link: "#"
            },
            {
                url: "image/gf9.webp",
                fallback: "image/gf9.jpg",
                title: "剑光凝霜",
                author: "沧元图动漫",
                link: "#"
            }
        ];

        // ========== SVG 占位图（当所有回退都失败时显示） ==========
        function getPlaceholder(text) {
            return 'data:image/svg+xml,' + encodeURIComponent(
                '<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240">' +
                '<rect width="320" height="240" fill="#2a1a3e"/>' +
                '<text x="160" y="115" text-anchor="middle" font-size="14" fill="#9980b3">🎨 ' + text + '</text>' +
                '<text x="160" y="135" text-anchor="middle" font-size="11" fill="#665580">图片加载失败</text>' +
                '</svg>'
            );
        }

        // ========== 智能回退：webp 失败试 jpg，jpg 失败试 webp ==========
        function handleImgError(img, fallbackUrl) {
            var currentSrc = img.getAttribute('src');
            var failedSrc = img.getAttribute('data-failed') || '';
            var triedList = failedSrc ? failedSrc.split('|') : [];

            // 记录本次失败的 src
            triedList.push(currentSrc);
            img.setAttribute('data-failed', triedList.join('|'));

            // 策略1: 如果指定了 fallback 且还没试过，用 fallback
            if (fallbackUrl && triedList.indexOf(fallbackUrl) === -1) {
                img.src = fallbackUrl;
                return;
            }

            // 策略2: 自动推断回退 — .webp ↔ .jpg
            var altSrc = null;
            var lower = currentSrc.toLowerCase();
            if (lower.endsWith('.webp')) {
                altSrc = currentSrc.slice(0, -5) + '.jpg';
            } else if (lower.endsWith('.jpg')) {
                altSrc = currentSrc.slice(0, -4) + '.webp';
            } else if (lower.endsWith('.png')) {
                altSrc = currentSrc.slice(0, -4) + '.webp';
            }

            if (altSrc && triedList.indexOf(altSrc) === -1) {
                img.src = altSrc;
                return;
            }

            // 策略3: 所有回退都失败，显示占位图
            img.onerror = null; // 防止无限循环
            img.src = getPlaceholder(img.alt || '图片');
        }

        function renderPaintings() {
            var grid = document.getElementById('paintingGrid');
            if (!grid) return;

            grid.innerHTML = paintings.map(function(p) {
                var isSpecial = p.special === true;
                var linkText = isSpecial ? '查看大图' : '查看详情';
                var fullImageUrl = p.originalUrl || p.url;

                // 生成 onerror 属性
                var fallbackAttr = p.fallback ? ("'" + p.fallback + "'") : 'null';
                var onerrorFn = "handleImgError(this, " + fallbackAttr + ")";

                var cardOnClick = '';
                var linkOnClick = '';

                if (isSpecial) {
                    cardOnClick = '';
                    linkOnClick = 'onclick="event.stopPropagation(); showImagePreview(\'' + fullImageUrl + '\')"';
                } else {
                    cardOnClick = 'onclick="window.open(\'' + (p.link || '#') + '\', \'_blank\')"';
                    linkOnClick = 'onclick="event.stopPropagation(); window.open(\'' + (p.link || '#') + '\', \'_blank\')"';
                }

                return ''
                    + '<div class="painting-card"' + (cardOnClick ? ' ' + cardOnClick : '') + '>'
                    +   '<img class="painting-img"'
                    +     ' src="' + p.url + '"'
                    +     ' alt="' + escapeHtml(p.title) + '"'
                    +     ' loading="lazy"'
                    +     ' onerror="' + onerrorFn + '"'
                    +   '>'
                    +   '<div class="painting-info">'
                    +     '<h3>' + escapeHtml(p.title) + '</h3>'
                    +     '<div class="painting-author">'
                    +       '<span>' + escapeHtml(p.author) + '</span>'
                    +       '<span class="view-link" style="cursor: pointer; color: #e2caff;" ' + linkOnClick + '>'
                    +         '🔗 ' + linkText + ' →'
                    +       '</span>'
                    +     '</div>'
                    +   '</div>'
                    + '</div>';
            }).join('');
        }

        // 辅助函数：防止XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 图片预览弹窗函数
        function showImagePreview(imageUrl) {
            var modal = document.getElementById('imagePreviewModal');
            var previewImg = document.getElementById('previewImage');
            if (!modal || !previewImg) return;
            previewImg.src = imageUrl;
            modal.style.display = 'flex';
        }

        function closeImagePreview() {
            var modal = document.getElementById('imagePreviewModal');
            if (modal) {
                modal.style.display = 'none';
            }
        }

        // 点击 ESC 键关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeImagePreview();
            }
        });

        // 初始化渲染
        renderPaintings();
    </script>
</body>
</html>
