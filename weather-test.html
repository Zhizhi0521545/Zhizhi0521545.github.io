<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灯火集 · 天气特效调试面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ========== 天气主题背景 ========== */
        body[data-theme="晴"] { background: linear-gradient(135deg, hwb(37 40% 8%), #f7d794); color: #5a3a1a; }
        body[data-theme="晴夜"] { background: linear-gradient(135deg, #0a1628, #1a2a4a); color: #d4c4e8; }
        body[data-theme="多云"] { background: linear-gradient(135deg, #8ea0b0, #b0c0d0); color: #2a3a4a; }
        body[data-theme="阴"] { background: linear-gradient(135deg, #6b7b8d, #8e9eae); color: #e0e8f0; }
        body[data-theme="小雨"] { background: linear-gradient(135deg, #3a5a6e, #5a7a8e); color: #d0e8f0; }
        body[data-theme="中雨"] { background: linear-gradient(135deg, #2a4a5e, #3a5a6e); color: #c0d8e8; }
        body[data-theme="大雨"] { background: linear-gradient(135deg, #1a3a4e, #2a4a5e); color: #b0c8d8; }
        body[data-theme="暴雨"] { background: linear-gradient(135deg, #0a2a3e, #1a3a4e); color: #a0b8c8; }
        body[data-theme="雨夜"] { background: linear-gradient(135deg, #0f1a2a, #1a2a3e); color: #b8c8e0; }
        body[data-theme="小雪"] { background: linear-gradient(135deg, #cfe8f0, #e0f0f8); color: #2c5a6e; }
        body[data-theme="中雪"] { background: linear-gradient(135deg, #b8d8e8, #c8e8f0); color: #1a4a5e; }
        body[data-theme="大雪"] { background: linear-gradient(135deg, #a0c8d8, #b8d8e8); color: #0a3a4e; }
        body[data-theme="雪夜"] { background: linear-gradient(135deg, #0f2a2a, #1e3a3e); color: #c8e0e8; }
        body[data-theme="雾"] { background: linear-gradient(135deg, #9aa8b8, #bac8d8); color: #3a4a5a; }
        body[data-theme="雷阵雨"] { background: linear-gradient(135deg, #1a1a2e, #2a1a3e); color: #e0c0ff; }
        body[data-theme="雷暴"] { background: linear-gradient(135deg, #0a0a1e, #1a0a2e); color: #d0a0f0; }
        body[data-theme="浮尘"] { background: linear-gradient(135deg, #b8a88a, #c8b89a); color: #4a3a2a; }
        body[data-theme="扬沙"] { background: linear-gradient(135deg, #c8b88a, #d8c89a); color: #4a3a2a; }

        /* 主卡片 */
        .preview-card {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 20;
            position: relative;
        }

        .weather-icon { font-size: 4rem; margin-bottom: 0.5rem; }
        .theme-name { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.5rem; }
        .temp-demo { font-size: 1.8rem; margin: 0.5rem 0; }
        .weather-detail { font-size: 0.85rem; opacity: 0.8; margin-bottom: 1rem; }

        /* 调试面板 */
        .debug-panel { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.2); }
        .panel-title { font-size: 0.8rem; opacity: 0.7; margin-bottom: 1rem; letter-spacing: 2px; }
        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; max-height: 280px; overflow-y: auto; padding: 0.2rem; }
        .theme-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.3); padding: 0.5rem 0.2rem; border-radius: 32px; color: inherit; font-size: 0.7rem; cursor: pointer; transition: 0.15s; }
        .theme-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.02); }
        .theme-btn.active { background: rgba(255,255,255,0.3); border-color: rgba(255,215,0,0.6); box-shadow: 0 0 8px rgba(255,215,0,0.4); }
        .status-note { margin-top: 1rem; font-size: 0.7rem; opacity: 0.6; }

        /* 特效层 */
        .weather-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .lightning-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 12; background: transparent; transition: background 0.05s; }
    </style>
</head>
<body>

<div class="lightning-flash" id="lightningFlash"></div>
<canvas id="weatherCanvas" class="weather-canvas"></canvas>

<div class="preview-card">
    <div class="weather-icon" id="weatherIcon">☀️</div>
    <div class="theme-name" id="themeName">晴 · 日间</div>
    <div class="temp-demo" id="tempDemo">🌡️ 28°C</div>
    <div class="weather-detail" id="weatherDetail">阳光明媚，灯火温暖</div>
    
    <div class="debug-panel">
        <div class="panel-title">🎨 天气预报类型 · 点击测试特效</div>
        <div class="theme-grid" id="themeGrid"></div>
        <div class="status-note">
            💡 点击任意天气类型 → 自动切换主题 + 对应特效<br>
            🌧️ 雨（小雨/中雨/大雨/暴雨）→ 雨滴密度不同<br>
            ❄️ 雪（小雪/中雪/大雪）→ 雪花密度不同<br>
            ⛈️ 雷阵雨/雷暴 → 雨 + 随机闪电<br>
            🫧 雾/浮尘 → 无粒子特效
        </div>
    </div>
</div>

<script>
    // ========== 高德天气预报类型完整映射 ==========
    const weatherThemes = [
        { name: "晴", value: "晴", icon: "☀️", temp: "28°C", desc: "阳光明媚，灯火温暖", effect: "none", bgType: "晴" },
        { name: "晴·夜", value: "晴夜", icon: "🌙", temp: "18°C", desc: "星夜澄澈，灯火微明", effect: "none", bgType: "晴夜" },
        { name: "多云", value: "多云", icon: "⛅", temp: "24°C", desc: "云卷云舒，灯火依旧", effect: "none", bgType: "多云" },
        { name: "阴", value: "阴", icon: "☁️", temp: "22°C", desc: "天色沉沉，灯火不熄", effect: "none", bgType: "阴" },
        { name: "小雨", value: "小雨", icon: "🌦️", temp: "20°C", desc: "细雨绵绵，灯火朦胧", effect: "light_rain", bgType: "小雨", rainIntensity: 80 },
        { name: "中雨", value: "中雨", icon: "🌧️", temp: "18°C", desc: "雨声淅沥，灯火如豆", effect: "medium_rain", bgType: "中雨", rainIntensity: 150 },
        { name: "大雨", value: "大雨", icon: "🌧️💧", temp: "16°C", desc: "大雨滂沱，灯火不灭", effect: "heavy_rain", bgType: "大雨", rainIntensity: 220 },
        { name: "暴雨", value: "暴雨", icon: "⛈️💧", temp: "15°C", desc: "暴雨如注，灯火守望", effect: "storm_rain", bgType: "暴雨", rainIntensity: 300 },
        { name: "雨·夜", value: "雨夜", icon: "🌧️🌙", temp: "16°C", desc: "夜雨敲窗，灯火摇曳", effect: "medium_rain", bgType: "雨夜", rainIntensity: 150 },
        { name: "小雪", value: "小雪", icon: "🌨️", temp: "-2°C", desc: "小雪纷飞，灯火温暖", effect: "light_snow", bgType: "小雪", snowCount: 60 },
        { name: "中雪", value: "中雪", icon: "❄️❄️", temp: "-5°C", desc: "中雪飘扬，灯火映雪", effect: "medium_snow", bgType: "中雪", snowCount: 100 },
        { name: "大雪", value: "大雪", icon: "❄️❄️❄️", temp: "-8°C", desc: "大雪漫天，灯火如炬", effect: "heavy_snow", bgType: "大雪", snowCount: 150 },
        { name: "雪·夜", value: "雪夜", icon: "❄️🌙", temp: "-10°C", desc: "雪夜寂静，灯火守望", effect: "medium_snow", bgType: "雪夜", snowCount: 100 },
        { name: "雾", value: "雾", icon: "🌫️", temp: "15°C", desc: "雾色朦胧，灯火如幻", effect: "none", bgType: "雾" },
        { name: "雷阵雨", value: "雷阵雨", icon: "⛈️", temp: "22°C", desc: "雷声轰鸣，灯火不惊", effect: "thunderstorm", bgType: "雷阵雨", rainIntensity: 180 },
        { name: "雷暴", value: "雷暴", icon: "🌩️⚡", temp: "20°C", desc: "雷电交加，灯火不灭", effect: "thunderstorm", bgType: "雷暴", rainIntensity: 250 },
        { name: "浮尘", value: "浮尘", icon: "🏜️", temp: "26°C", desc: "浮尘弥漫，灯火微黄", effect: "none", bgType: "浮尘" },
        { name: "扬沙", value: "扬沙", icon: "💨", temp: "25°C", desc: "风沙轻扬，灯火依旧", effect: "none", bgType: "扬沙" }
    ];
    
    // 当前状态
    let currentEffect = "none";
    let animationId = null;
    let ctx = null;
    let canvas = null;
    let particles = [];
    let lightningInterval = null;
    let currentRainIntensity = 150;
    let currentSnowCount = 80;
    
    // 生成主题按钮
    const themeGrid = document.getElementById('themeGrid');
    weatherThemes.forEach(theme => {
        const btn = document.createElement('button');
        btn.className = 'theme-btn';
        btn.innerHTML = `${theme.icon} ${theme.name}`;
        btn.onclick = () => setTheme(theme);
        themeGrid.appendChild(btn);
    });
    
    // 设置主题
    function setTheme(theme) {
        // 停止所有特效
        stopAllEffects();
        
        // 切换背景主题
        document.body.setAttribute('data-theme', theme.bgType);
        
        // 更新UI
        document.getElementById('weatherIcon').innerHTML = theme.icon;
        document.getElementById('themeName').innerHTML = theme.name;
        document.getElementById('tempDemo').innerHTML = `🌡️ ${theme.temp}`;
        document.getElementById('weatherDetail').innerHTML = theme.desc;
        
        // 高亮按钮
        document.querySelectorAll('.theme-btn').forEach((btn, idx) => {
            if (weatherThemes[idx].value === theme.value) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        // 启动对应特效
        currentEffect = theme.effect;
        
        switch(theme.effect) {
            case 'light_rain':
                startRainEffect(80);  // 小雨 → 稀疏
                break;
            case 'medium_rain':
                startRainEffect(150); // 中雨 → 中等
                break;
            case 'heavy_rain':
                startRainEffect(220); // 大雨 → 密集
                break;
            case 'storm_rain':
                startRainEffect(300); // 暴雨 → 非常密集
                break;
            case 'light_snow':
                startSnowEffect(60);  // 小雪 → 稀疏
                break;
            case 'medium_snow':
                startSnowEffect(100); // 中雪 → 中等
                break;
            case 'heavy_snow':
                startSnowEffect(150); // 大雪 → 密集
                break;
            case 'thunderstorm':
                startRainEffect(theme.rainIntensity || 200);
                startLightning();
                break;
            default:
                // 无特效
                break;
        }
    }
    
    // ========== 雨滴特效（支持密度控制）==========
    function startRainEffect(particleCount) {
        canvas = document.getElementById('weatherCanvas');
        if (!canvas) return;
        ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const count = Math.min(particleCount, 500); // 限制最大500滴
        particles = [];
        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                length: 8 + Math.random() * 15,
                speed: 6 + Math.random() * 12,
                width: 1 + Math.random() * 1.5
            });
        }
        
        function draw() {
            if (!ctx || !canvas || (currentEffect !== 'light_rain' && currentEffect !== 'medium_rain' && currentEffect !== 'heavy_rain' && currentEffect !== 'storm_rain' && currentEffect !== 'thunderstorm')) {
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let p of particles) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - 2, p.y + p.length);
                ctx.strokeStyle = `rgba(180, 210, 240, ${0.4 + Math.random() * 0.3})`;
                ctx.lineWidth = p.width;
                ctx.stroke();
                p.y += p.speed;
                if (p.y > canvas.height) {
                    p.y = -p.length;
                    p.x = Math.random() * canvas.width;
                }
            }
            animationId = requestAnimationFrame(draw);
        }
        draw();
    }
    
    // ========== 雪花特效（支持密度控制）==========
    function startSnowEffect(snowCount) {
        canvas = document.getElementById('weatherCanvas');
        if (!canvas) return;
        ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const count = Math.min(snowCount, 200);
        particles = [];
        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: 2 + Math.random() * 5,
                speed: 0.8 + Math.random() * 3,
                drift: 0.3 + Math.random() * 0.8,
                opacity: 0.5 + Math.random() * 0.4
            });
        }
        
        function draw() {
            if (!ctx || !canvas || (currentEffect !== 'light_snow' && currentEffect !== 'medium_snow' && currentEffect !== 'heavy_snow')) {
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity * 0.7})`;
                ctx.fill();
                p.y += p.speed;
                p.x += Math.sin(Date.now() * 0.002 + p.y) * p.drift * 0.5;
                if (p.y > canvas.height) {
                    p.y = -p.radius;
                    p.x = Math.random() * canvas.width;
                }
            }
            animationId = requestAnimationFrame(draw);
        }
        draw();
    }
    
    // ========== 闪电特效 ==========
    function startLightning() {
        if (lightningInterval) clearInterval(lightningInterval);
        
        const flashDiv = document.getElementById('lightningFlash');
        
        function doLightning() {
            // 随机间隔 3-8 秒一次闪电
            const nextDelay = 3000 + Math.random() * 5000;
            setTimeout(() => {
                if (currentEffect !== 'thunderstorm') return;
                
                // 闪电效果：闪两次
                flashDiv.style.background = 'rgba(255, 255, 200, 0.9)';
                setTimeout(() => { flashDiv.style.background = 'rgba(255, 255, 200, 0.3)'; }, 50);
                setTimeout(() => { flashDiv.style.background = 'rgba(255, 255, 200, 0.8)'; }, 80);
                setTimeout(() => { flashDiv.style.background = 'transparent'; }, 130);
                
                doLightning();
            }, nextDelay);
        }
        doLightning();
    }
    
    function stopAllEffects() {
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        if (lightningInterval) {
            clearInterval(lightningInterval);
            lightningInterval = null;
        }
        if (ctx && canvas) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        particles = [];
        
        // 清除闪电效果
        const flashDiv = document.getElementById('lightningFlash');
        if (flashDiv) flashDiv.style.background = 'transparent';
    }
    
    // 窗口适配
    window.addEventListener('resize', () => {
        if (canvas && (currentEffect.includes('rain') || currentEffect.includes('snow') || currentEffect === 'thunderstorm')) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // 重启当前特效
            const activeTheme = weatherThemes.find(t => t.value === document.body.getAttribute('data-theme') || 
                (document.body.getAttribute('data-theme') === t.bgType));
            if (activeTheme && (activeTheme.effect.includes('rain') || activeTheme.effect.includes('snow') || activeTheme.effect === 'thunderstorm')) {
                if (activeTheme.effect.includes('rain')) startRainEffect(activeTheme.rainIntensity || 150);
                else if (activeTheme.effect.includes('snow')) startSnowEffect(activeTheme.snowCount || 80);
                else if (activeTheme.effect === 'thunderstorm') startRainEffect(activeTheme.rainIntensity || 200);
            }
        }
    });
    
    // 默认启动：晴
    setTheme(weatherThemes[0]);
</script>
</body>
</html>
